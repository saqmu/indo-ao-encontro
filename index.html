<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indo ao Encontro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- CENÁRIO DO TREM -->
    <div id="cenario-total">
        
        <!-- JANELA (PARTE DE CIMA) -->
        <section id="janela">
            <div id="paisagem">
                <!-- As árvores e montanhas vão entrar aqui depois -->
                <div class="ceu"></div>
            </div>
        </section>

        <!-- MESA (PARTE DE BAIXO) -->
        <section id="mesa">
            <div id="livro">
                <h1 class="titulo-faustina">Minhas Anotações</h1>
                <textarea id="bloco-notas" placeholder="Escreva algo aqui..."></textarea>
            </div>
            <div id="cafe">☕</div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
