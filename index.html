<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indo ao Encontro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container-trem">
        
        <!-- JANELA -->
        <section id="area-janela">
            <div class="parede-madeira">
                <div class="moldura-janela">
                    <div id="paisagem">
                        <div class="ceu"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- MESA 3D -->
        <section id="area-mesa">
            <div id="chao-trem"></div>
            
            <div id="cena-3d">
                
                <!-- LIVRO 3D (POSICIONADO PARA NORDESTE) -->
                <div id="livro-3d">
                    <div class="capa-baixo"></div>
                    <div class="paginas-volume"></div>
                    <div class="pagina-topo">
                        <h2 class="titulo-faustina">Anotações</h2>
                        <div class="pauta-keep">
                            <textarea id="bloco-notas" placeholder="Escreva sua jornada..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- XÍCARA 3D -->
                <div id="xicara-3d">
                    <div class="vapor-container">
                        <span class="p p1"></span>
                        <span class="p p2"></span>
                        <span class="p p3"></span>
                    </div>
                    <div class="pires"></div>
                    <div class="corpo-xicara">
                        <div class="cafe-liquido"></div>
                    </div>
                    <div class="asa-xicara"></div>
                </div>

            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
