<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indo ao Encontro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container-trem">
        
        <!-- PARTE DA JANELA (O QUE VEMOS AO SUBIR) -->
        <section id="area-janela">
            <div class="moldura-janela">
                <div id="paisagem">
                    <div class="ceu"></div>
                    <!-- Árvores e biomas entrarão aqui futuramente -->
                </div>
            </div>
            <div class="parede-trem"></div>
        </section>

        <!-- PARTE DA MESA (O QUE VEMOS AO DESCER) -->
        <section id="area-mesa">
            <div id="mesa-superficie">
                
                <div id="livro-aberto">
                    <div class="pagina">
                        <h2 class="titulo-faustina">Indo ao Encontro</h2>
                        <textarea id="bloco-notas" placeholder="Escreva sua jornada aqui..."></textarea>
                    </div>
                </div>

                <div id="recipiente-cafe">
                    <div class="fumaca-wrapper">
                        <span class="vapor s1"></span>
                        <span class="vapor s2"></span>
                        <span class="vapor s3"></span>
                    </div>
                    <div id="cafe-icone">☕</div>
                </div>

            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
