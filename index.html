<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indo ao Encontro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container-trem">
        
        <!-- JANELA -->
        <section id="area-janela">
            <div class="parede-madeira"> <!-- Textura rústica aqui -->
                <div class="moldura-janela">
                    <div id="paisagem">
                        <div class="ceu"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- MESA E CHÃO -->
        <section id="area-mesa">
            <div id="chao-trem"></div> <!-- Chão que aparece atrás/abaixo da mesa -->
            
            <div id="reflexo-janela"></div>
            
            <div id="mesa-perspectiva">
                
                <!-- LIVRO COM VOLUME (Pseudo-3D) -->
                <div id="livro-container">
                    <div id="livro-aberto">
                        <div class="pagina esquerda">
                            <h2 class="titulo-faustina">Diário de Bordo</h2>
                        </div>
                        <div class="divisoria-central"></div>
                        <div class="pagina direita">
                            <textarea id="bloco-notas" placeholder="Comece a escrever sua jornada..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- CAFÉ COM PIRES -->
                <div id="recipiente-cafe">
                    <div class="vapor-container">
                        <span class="particula p1"></span>
                        <span class="particula p2"></span>
                        <span class="particula p3"></span>
                    </div>
                    <div id="pires"> <!-- O pires dá a profundidade -->
                        <div id="xicara">☕</div>
                    </div>
                </div>

            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
